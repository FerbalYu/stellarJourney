name: Test & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --ext .js

      - name: Prettier check
        run: npx prettier --check "src/**/*.js"

      - name: Jest tests
        run: npx jest --config jest.config.cjs --no-coverage

      - name: Standalone runner
        run: node tests/index.runner.mjs

      - name: Webpack build
        run: npx webpack --mode production --config webpack.config.cjs
